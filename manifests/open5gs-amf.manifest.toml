libos.entrypoint = "/usr/local/bin/open5gs-amfd"

loader.argv = [
  "/usr/local/bin/open5gs-amfd",
  "-c",
  "/usr/local/etc/open5gs/amf.yaml"
]

loader.env.LD_LIBRARY_PATH = "/usr/local/lib/x86_64-linux-gnu:/lib/x86_64-linux-gnu:/usr/lib/x86_64-linux-gnu"

loader.env.MALLOC_ARENA_MAX = "2"
loader.env.MALLOC_MMAP_THRESHOLD_ = "131072"

loader.log_level = "error"

# Performance: Disable pointer validation (re-enable for debugging)
libos.check_invalid_pointers = false

sys.enable_extra_runtime_domain_names_conf = true
# sys.insecure__allow_eventfd = true  # DISABLED for security
sys.enable_sigterm_injection = true

sys.fds.limit = 8192

sys.allowed_ioctls = [
  { request_code = 0x8910 },
  { request_code = 0x8912 },
  { request_code = 0x8913 },
  { request_code = 0x8915 },
  { request_code = 0x89F0 },
  { request_code = 0x89F1 },
  { request_code = 0x89F2 },
  { request_code = 0x89F3 },
  { request_code = 0x89F4 }
]

fs.root = { uri = "file:/" }
fs.mounts = [
  { path = "/var/local/log/open5gs", uri = "file:/usr/local/var/log/open5gs" }, 
  { path = "/tmp", type = "tmpfs"},
]

# Files that must be allowed (not trusted) due to dynamic changes or write access
sgx.allowed_files = [
  "file:/etc/hosts",
  "file:/etc/resolv.conf",
  "file:/etc/gai.conf",
  "file:/etc/host.conf",
  "file:/etc/ld.so.cache",
  "file:/usr/local/var/log/open5gs/",
  "file:/usr/local/etc/open5gs/tls/",        # TLS keys (sensitive, not hashed)
]

# Static configuration and binaries requiring hash verification
sgx.trusted_files = [
  # Static configuration files
  "file:/etc/nsswitch.conf",
  "file:/usr/local/etc/open5gs/amf.yaml",
  "file:/etc/localtime",

  # Application binaries and libraries
  "file:/usr/local/bin/open5gs-amfd",
  "file:/lib/x86_64-linux-gnu/ld-linux-x86-64.so.2",
  "file:/lib/x86_64-linux-gnu/libbrotlicommon.so.1",
  "file:/lib/x86_64-linux-gnu/libbrotlidec.so.1",
  "file:/lib/x86_64-linux-gnu/libcom_err.so.2",
  "file:/lib/x86_64-linux-gnu/libcrypto.so.3",
  "file:/lib/x86_64-linux-gnu/libc.so.6",
  "file:/lib/x86_64-linux-gnu/libcurl.so.4",
  "file:/lib/x86_64-linux-gnu/libffi.so.8",
  "file:/lib/x86_64-linux-gnu/libgmp.so.10",
