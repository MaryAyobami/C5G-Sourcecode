# NF addresses per deployment model.
# Replace placeholder hosts with your own testbed before running.

[ueransim]
host       = gnb-host
user       = ueransim
gnb_binary = /opt/UERANSIM/build/nr-gnb
gnb_config = /opt/UERANSIM/config/open5gs-gnb.yaml
ue_binary  = /opt/UERANSIM/build/nr-ue
ue_config  = /opt/UERANSIM/config/open5gs-ue.yaml
timeout      = 30
cooldown     = 5
ue_imsi_base = 999700000000001
ue_max_count = 1000

iperf3_server = 192.0.2.20
iperf3_port   = 5201
ping_target   = 192.0.2.10
http_url      = http://192.0.2.20:8080/testfile

[baseline]
amf = 192.0.2.10
amf_ngap_port = 38412
smf = 127.0.0.4
upf = 192.0.2.10
upf_gtpu_port = 2152
ausf = 127.0.0.9
udm = 127.0.0.12
udr = 127.0.0.20
pcf = 127.0.0.13
nrf = 127.0.0.10
nssf = 127.0.0.14
bsf = 127.0.0.15
scp = 127.0.0.200
upf_gtpu = 10.45.0.1
log_dir = /var/local/log/open5gs
ipsec_enabled = false

# AMF in TDX VM, other NFs (incl. UPF) in SGX enclaves on the SGX host.
[sgx]
amf = 198.51.100.11
smf = 192.0.2.10
upf = 192.0.2.10
ausf = 192.0.2.10
udm = 192.0.2.10
udr = 192.0.2.10
pcf = 192.0.2.10
nrf = 192.0.2.10
nssf = 192.0.2.10
bsf = 192.0.2.10
scp = 192.0.2.10
upf_gtpu = 10.45.0.1
log_dir = /usr/local/var/log/open5gs

# AMF and UPF in separate TDX VMs; remaining NFs in SGX on the SGX host.
[hybrid]
amf = 198.51.100.11
smf = 192.0.2.10
upf = 198.51.100.12
ausf = 192.0.2.10
udm = 192.0.2.10
udr = 192.0.2.10
pcf = 192.0.2.10
nrf = 192.0.2.10
nssf = 192.0.2.10
bsf = 192.0.2.10
scp = 192.0.2.10
upf_gtpu = 10.45.0.1
log_dir = /usr/local/var/log/open5gs

